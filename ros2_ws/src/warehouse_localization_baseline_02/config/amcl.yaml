# M3 Baseline — AMCL 파라미터
# 개활 창고에서 AMCL 단독 로컬라이제이션. laser_max_range 는 커스텀 12m LiDAR 에 맞춤.
# 모션모델 alpha 는 개활지에서 파티클이 얼마나 퍼지는지(확신도 붕괴)에 직결.
amcl:
  ros__parameters:
    use_sim_time: true
    base_frame_id: "base_footprint"
    odom_frame_id: "odom"
    global_frame_id: "map"
    scan_topic: "scan"

    set_initial_pose: true          # launch 에서 initial_pose 오버라이드
    initial_pose:
      x: -24.0
      y: -24.0
      z: 0.0
      yaw: 0.0

    # 파티클 필터
    max_particles: 3000
    min_particles: 500
    pf_err: 0.05
    pf_z: 0.99

    # 레이저 관측 모델
    laser_model_type: "likelihood_field"
    laser_max_range: 12.0
    laser_min_range: 0.12
    max_beams: 120
    z_hit: 0.5
    z_rand: 0.5
    z_max: 0.05
    z_short: 0.05
    sigma_hit: 0.2
    laser_likelihood_max_dist: 2.0
    do_beamskip: false

    # 모션 모델 (오도메트리 노이즈 가정)
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2

    # 업데이트 / TF
    update_min_d: 0.2
    update_min_a: 0.2
    resample_interval: 1
    transform_tolerance: 1.0
    recovery_alpha_slow: 0.0
    recovery_alpha_fast: 0.0
    tf_broadcast: true
    save_pose_rate: 0.5

lifecycle_manager_localization:
  ros__parameters:
    use_sim_time: true
    autostart: true
    node_names: ["map_server", "amcl"]
    bond_timeout: 0.0
